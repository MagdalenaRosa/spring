<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Title</title>


</head>
<body>
<div th:replace="~{fragments/main-menu}"></div>
<h1>Category List</h1>
<ul>
    <li th:each="category : ${data}">
        <!--        <h2 th:text="${category.getName()}"></h2>-->
        <a th:href="'/categoryDetails/'+${category.getId()}" th:text="${category.getName()}"></a>
        <a th:href="'/removeCategory/'+${category.getId()}">❌</a>
        <a th:href="'/editCategory/'+${category.getId()}">[Edit]</a>
</ul>
<div th:replace="~{fragments/save-Category}"></div>

</body>
</html>
