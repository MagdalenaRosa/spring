<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Title</title>
</head>
<body>
<div th:replace="~{fragments/main-menu}"></div>
<h1>List of Products</h1>
<!--chcemy by te dane wprowadzane były dnamiczne nie statyczne więc trzeba je jakośc wepchnąc -->
<ul>
<!--    //for prduct in db print(product)-->
    <li th:each="product: ${db}">
    <span th:text="${product.getName()}"></span>
        <a th:href="'/removeProduct?productId='+${product.getId()}">❌</a>

    </li>
<!--    th - od thimeleaf
zapytanie ${} -> place holder

-->
</ul>
<div th:replace="~{fragments/save-product}"></div>

</body>
</html>
